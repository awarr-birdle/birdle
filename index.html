<!DOCTYPE html>
<html>

<meta charset="UTF-8">
<title>PGA Weddle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#0b3d2e;margin:0;color:white;text-align:center}
h1{margin-top:20px}
.container{max-width:900px;margin:auto;padding:20px}

.searchBox{position:relative;margin-bottom:10px}
input{width:100%;padding:12px;font-size:16px;border-radius:8px;border:none}

#suggestions{position:absolute;background:white;color:black;width:100%;border-radius:8px;max-height:200px;overflow-y:auto;z-index:10}
.suggestion{padding:10px;cursor:pointer}
.suggestion:hover{background:#eee}

button{margin-top:10px;padding:10px 20px;font-size:16px;border:none;border-radius:8px;background:#1abc9c;color:white;cursor:pointer}

.table{margin-top:20px;border-collapse:collapse;width:100%}
.table th,.table td{border:1px solid #ccc;padding:8px}

.correct{background:#2ecc71}
.close{background:#f1c40f;color:black}
.wrong{background:#7f8c8d}

.tile{display:inline-block;padding:6px 10px;margin:2px;border-radius:4px;font-weight:bold}
#share{margin-top:20px}
</style>
</head>
<body>
<div class="container">
<h1>🏌️ PGA Weddle</h1>
<p>Guess the mystery PGA golfer</p>

<div class="searchBox">
<input id="guessInput" placeholder="Start typing a golfer name..." oninput="showSuggestions()">
<div id="suggestions"></div>
</div>

<button onclick="submitGuess()">Guess</button>

<table class="table" id="results">

<th>Age</th>
<th>Height</th>

<div id="share"></div>

</div>

const todaySeed=new Date().toDateString();
let seed=0;
for(let i=0;i<todaySeed.length;i++){seed+=todaySeed.charCodeAt(i);} 
const mystery=golfers[seed%golfers.length];

let guesses=[];

function showSuggestions(){
const input=document.getElementById("guessInput").value.toLowerCase();
const box=document.getElementById("suggestions");
box.innerHTML="";
if(!input)return;

golfers
.filter(g=>g.name.toLowerCase().includes(input))
.forEach(g=>{
const div=document.createElement("div");
div.className="suggestion";
div.textContent=g.name;
div.onclick=()=>{
document.getElementById("guessInput").value=g.name;
box.innerHTML="";
};
box.appendChild(div);
});
}

function compare(val,guess){
if(val===guess) return {class:"correct",text:guess};

if(typeof val==="number"){
if(guess<val) return {class:"close",text:guess+" ↑"};
if(guess>val) return {class:"close",text:guess+" ↓"};
}

return {class:"wrong",text:guess};
}

function submitGuess(){
const name=document.getElementById("guessInput").value;
const guess=golfers.find(g=>g.name===name);
if(!guess){alert("Select a golfer from the list");return}

const table=document.getElementById("results");
const row=document.createElement("tr");

function addCell(value,status){
const td=document.createElement("td");

if(status && typeof status === "object"){
td.textContent=status.text;
td.className=status.class;
}else{
td.textContent=value;
if(status) td.className=status;
}

row.appendChild(td);
}

addCell(guess.name);
addCell(guess.country,compare(mystery.country,guess.country));
addCell(guess.age,compare(mystery.age,guess.age));
addCell(guess.height,compare(mystery.height,guess.height));
addCell(guess.hand,compare(mystery.hand,guess.hand));
addCell(guess.majors,compare(mystery.majors,guess.majors));
addCell(guess.pro,compare(mystery.pro,guess.pro));


table.appendChild(row);

guesses.push(row.innerHTML);

if(guess.name===mystery.name){
endGame();
}
}

function endGame(){
let share="PGA Weddle " + guesses.length + "/∞\n";

guesses.forEach(g=>{
const div=document.createElement("div");
div.innerHTML=g;
const cells=div.querySelectorAll("td");

cells.forEach((c,i)=>{
if(i===0)return;
if(c.className==="correct")share+="🟩";
else if(c.className==="close")share+="🟨";
else share+="⬛";
});

share+="\n";
});

const shareDiv=document.getElementById("share");
shareDiv.innerHTML="<h3>You got it! The golfer was "+mystery.name+"</h3><pre>"+share+"</pre>";
}

</script>
