<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PGA Weddle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#0b3d2e;margin:0;color:white;text-align:center}
h1{margin-top:20px}
.container{max-width:900px;margin:auto;padding:20px}

.searchBox{position:relative;margin-bottom:10px}
input{width:100%;padding:12px;font-size:16px;border-radius:8px;border:none}

#suggestions{position:absolute;background:white;color:black;width:100%;border-radius:8px;max-height:200px;overflow-y:auto;z-index:10}
.suggestion{padding:10px;cursor:pointer}
.suggestion:hover{background:#eee}

button{margin-top:10px;padding:10px 20px;font-size:16px;border:none;border-radius:8px;background:#1abc9c;color:white;cursor:pointer}

.table{margin-top:20px;border-collapse:collapse;width:100%}
.table th,.table td{border:1px solid #ccc;padding:8px}

.correct{background:#2ecc71}
.close{background:#f1c40f;color:black}
.wrong{background:#7f8c8d}

#share{margin-top:20px}
</style>
</head>
<body>
<div class="container">
<h1>🏌️ PGA Weddle</h1>
<p>Guess the mystery PGA golfer</p>

<div class="searchBox">
<input id="guessInput" placeholder="Start typing a golfer name..." oninput="showSuggestions()">
<div id="suggestions"></div>
</div>

<button onclick="submitGuess()">Guess</button>

<table class="table" id="results">
<tr>
<th>Name</th>
<th>Country</th>
<th>Age</th>
<th>Height</th>
<th>Hand</th>
<th>Majors</th>
<th>Turned Pro</th>
</tr>
</table>

<div id="share"></div>
</div>

<script>

const golfers=[
{name:"Scottie Scheffler",country:"USA",age:28,height:75,hand:"R",majors:2,pro:2018},
{name:"Rory McIlroy",country:"NIR",age:35,height:69,hand:"R",majors:4,pro:2007},
{name:"Jon Rahm",country:"ESP",age:29,height:74,hand:"R",majors:2,pro:2016},
{name:"Jordan Spieth",country:"USA",age:30,height:73,hand:"R",majors:3,pro:2012},
{name:"Justin Thomas",country:"USA",age:31,height:70,hand:"R",majors:2,pro:2013},
{name:"Collin Morikawa",country:"USA",age:27,height:69,hand:"R",majors:2,pro:2019},
{name:"Xander Schauffele",country:"USA",age:30,height:70,hand:"R",majors:2,pro:2015},
{name:"Viktor Hovland",country:"NOR",age:26,height:70,hand:"R",majors:0,pro:2019},
{name:"Patrick Cantlay",country:"USA",age:32,height:70,hand:"R",majors:0,pro:2012},
{name:"Tony Finau",country:"USA",age:34,height:76,hand:"R",majors:0,pro:2007},
{name:"Brooks Koepka",country:"USA",age:33,height:72,hand:"R",majors:5,pro:2012},
{name:"Dustin Johnson",country:"USA",age:39,height:76,hand:"R",majors:2,pro:2007},
{name:"Hideki Matsuyama",country:"JPN",age:32,height:71,hand:"R",majors:1,pro:2013},
{name:"Tommy Fleetwood",country:"ENG",age:33,height:71,hand:"R",majors:0,pro:2010},
{name:"Matt Fitzpatrick",country:"ENG",age:29,height:70,hand:"R",majors:1,pro:2014},
{name:"Shane Lowry",country:"IRL",age:37,height:73,hand:"R",majors:1,pro:2009},
{name:"Adam Scott",country:"AUS",age:43,height:72,hand:"R",majors:1,pro:2000},
{name:"Rickie Fowler",country:"USA",age:35,height:69,hand:"R",majors:0,pro:2009},
{name:"Max Homa",country:"USA",age:33,height:73,hand:"R",majors:0,pro:2013},
{name:"Cameron Smith",country:"AUS",age:30,height:71,hand:"R",majors:1,pro:2013}
];

let mystery;
let guesses=[];
let gameActive=true;
let row;

function feetInches(inches){
let ft=Math.floor(inches/12);
let inc=inches%12;
let meters=(inches*2.54/100).toFixed(2);
return ft+"'"+inc+"\" ("+meters+" m)";
}

function newGame(){
const seed=Math.floor(Math.random()*golfers.length);
mystery=golfers[seed];
guesses=[];
gameActive=true;
document.getElementById("results").innerHTML=`<tr><th>Name</th><th>Country</th><th>Age</th><th>Height</th><th>Hand</th><th>Majors</th><th>Turned Pro</th></tr>`;
document.getElementById("share").innerHTML="";
document.getElementById("guessInput").value="";
}

newGame();

function showSuggestions(){
const input=document.getElementById("guessInput").value.toLowerCase();
const box=document.getElementById("suggestions");
box.innerHTML="";
if(!input)return;

golfers.filter(g=>g.name.toLowerCase().includes(input)).forEach(g=>{
const div=document.createElement("div");
div.className="suggestion";
div.textContent=g.name;
div.onclick=()=>{document.getElementById("guessInput").value=g.name;box.innerHTML="";};
box.appendChild(div);
});
}

function compare(val,guess){
if(typeof val==="number"){
let diff=Math.abs(val-guess);
let arrow="";
if(guess<val) arrow=" ↑";
if(guess>val) arrow=" ↓";

if(val===guess) return {class:"correct",text:guess};
if(diff<=2) return {class:"close",text:guess+arrow};
return {class:"wrong",text:guess+arrow};
}

return val===guess ? {class:"correct",text:guess}:{class:"wrong",text:guess};
}

function addCell(value,status){
const td=document.createElement("td");
if(status && typeof status==="object"){
td.textContent=status.text;
td.className=status.class;
}else{
td.textContent=value;
}
row.appendChild(td);
}

function submitGuess(){
if(!gameActive)return;
const name=document.getElementById("guessInput").value;
const guess=golfers.find(g=>g.name===name);
if(!guess)return alert("Select a golfer");

row=document.createElement("tr");

addCell(guess.name);
addCell(guess.country,compare(mystery.country,guess.country));
addCell(guess.age,compare(mystery.age,guess.age));
addCell(feetInches(guess.height),compare(mystery.height,guess.height));
addCell(guess.hand,compare(mystery.hand,guess.hand));
addCell(guess.majors,compare(mystery.majors,guess.majors));
addCell(guess.pro,compare(mystery.pro,guess.pro));

document.getElementById("results").appendChild(row);

guesses.push(row.innerHTML);

if(guess.name===mystery.name){
endGame();
}
}

function endGame(){
gameActive=false;
let share="PGA Weddle\n";

guesses.forEach(g=>{
let div=document.createElement("div");
div.innerHTML=g;
let cells=div.querySelectorAll("td");
cells.forEach((c,i)=>{
if(i===0)return;
if(c.className=="correct")share+="🟩";
else if(c.className=="close")share+="🟨";
else share+="⬛";
});
share+="\n";
});

let shareDiv=document.getElementById("share");
shareDiv.innerHTML=`<h3>You got it! ${mystery.name}</h3><pre>${share}</pre><button onclick="newGame()">Play Unlimited</button>`;
}

</script>
</body>
</html>
